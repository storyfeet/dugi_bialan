<textarea id="roman">
</textarea>
<div id="dugi"><div>

<script type="module">
	import {fontMap,letterMap} from "/js/jsfontmapper.js";
	import * as TD from "/js/type_dugi.js" ;


	console.log('Prop ');

	let convert =  (event)=>{
		console.log("roman change");
		let converter = new TD.Converter(fontMap, letterMap);
		let s2 = converter.convert(event.target.value);
	    let op = document.getElementById("dugi");
		op.innerText = s2;
	};

	let roman = document.getElementById("roman");
	roman.onkeyup = convert;
	roman.onpropertychange = convert;
	roman.onpaste = convert;

</script>
